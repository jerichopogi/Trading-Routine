# FundedNext Stellar 2-step — rule parameters.
#
# Prop firm rules drift. Last confirmed: 2026-04-20 against live fundednext.com plan.
# Re-verify if FundedNext updates its plan terms or if you switch plan size.
#
# "hard_stop" values are tighter than the firm limit so we never touch the wall.

account:
  initial_balance: 50000        # override in .env via INITIAL_BALANCE if different
  currency: USD

drawdown:
  # Daily: measured from start-of-day equity (defined below).
  daily_loss_limit_pct: 5.0
  daily_loss_hard_stop_pct: 4.0
  # Max overall: measured from initial balance, high-water-mark NOT used by FundedNext Stellar.
  max_drawdown_pct: 10.0
  max_drawdown_hard_stop_pct: 8.0
  # Start-of-day equity: FundedNext Stellar resets daily loss at 00:00 server time.
  start_of_day_utc_hour: 22      # MT5 broker server is typically GMT+2/+3 → 22:00 UTC ≈ midnight server

risk:
  # Conviction-based sizing:
  #   - B grade ("okay" setup — meets playbook criteria): default risk.
  #   - A grade ("very good" setup — 5/5 on rubric in playbook.md): up to max risk.
  # Guardrail rejects anything above per_trade_risk_pct_max. The LLM picks the
  # grade in decide.draft_order() and sizes accordingly.
  per_trade_risk_pct: 0.5        # default (B grade)
  per_trade_risk_pct_max: 1.0    # ceiling (A grade) — hard cap enforced by guardrails
  max_concurrent_positions: 3
  max_new_positions_per_day: 5
  # Consistency rule (funded phase): no single day / single trade over this share of cumulative profit.
  consistency_max_single_trade_pct: 30.0

sessions:
  no_weekend_hold: true
  flatten_friday_utc: "21:00"    # close everything by this time on Fridays
  # Optional news blackout windows (±minutes around red-folder events).
  news_blackout_minutes: 5
  news_trading_allowed: false    # we disable by default; flip on manually if FundedNext allows for your plan

instruments:
  whitelist:
    - EURUSD
    - GBPUSD
    - USDJPY
    - USDCHF
    - AUDUSD
    - USDCAD
    - NZDUSD
    - US30
    - NDX100
    - SPX500
    - GER30
    - XAUUSD
    - XAGUSD
  # Optional per-instrument overrides (e.g., tighter risk on volatile symbols).
  overrides:
    XAUUSD:
      per_trade_risk_pct: 0.4
      per_trade_risk_pct_max: 0.8    # tighter ceiling on volatile metals
    NAS100:
      per_trade_risk_pct: 0.4
      per_trade_risk_pct_max: 0.8    # tighter ceiling on tech index
